<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Koa Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0a1f3c; --bg2:#0c2647; --panel:#0e2a4f; --panel2:#103257;
  --line:#d3e3f7; --dim:#5f86b8; --faint:rgba(120,160,210,0.22);
  --accent:#6db3e8; --amber:#e8a849; --good:#5fd0a8; --bad:#e8836b;
  --edge:rgba(120,160,210,0.28);
  --mono:'IBM Plex Mono',monospace; --cond:'Saira Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--mono); color:var(--line);
  background:
    linear-gradient(180deg,#0b2342 0%,#081a33 100%);
  overflow:hidden;
}
#root{height:100vh}
.app{height:100vh;display:flex;flex-direction:column;
  background-image:linear-gradient(var(--faint) 1px,transparent 1px),linear-gradient(90deg,var(--faint) 1px,transparent 1px);
  background-size:34px 34px; background-position:center;
}
.app::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(40,90,150,0.25),transparent 60%);pointer-events:none}

/* ---------- TOP BAR ---------- */
.topbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  padding:14px 22px;border-bottom:1px solid var(--edge);
  background:linear-gradient(180deg,rgba(16,46,82,0.85),rgba(10,30,58,0.7));backdrop-filter:blur(2px);z-index:5}
.brand-title{font-family:var(--cond);font-weight:700;font-size:25px;letter-spacing:2.5px;color:#eaf3ff;white-space:nowrap}
.brand-sub{font-size:11.5px;color:var(--dim);letter-spacing:0.4px;margin-top:1px}
.tabs{display:flex;gap:4px;background:rgba(8,22,44,0.6);padding:4px;border:1px solid var(--edge);border-radius:8px}
.tab{font-family:var(--cond);font-weight:600;font-size:14px;letter-spacing:2px;color:var(--dim);white-space:nowrap;
  background:transparent;border:none;padding:7px 20px;border-radius:5px;cursor:pointer;transition:.15s}
.tab:hover{color:var(--line)}
.tab.on{background:var(--accent);color:#072039}
.topright{display:flex;align-items:center;justify-content:flex-end;gap:14px}
.badge{font-size:9.5px;letter-spacing:1.2px;color:var(--amber);border:1px solid rgba(232,168,73,0.5);
  padding:5px 9px;border-radius:4px;white-space:nowrap}

/* ---------- BODY ---------- */
.body{flex:1;display:flex;min-height:0;position:relative;z-index:2}
.rail{display:flex;flex-direction:column;gap:10px;padding:16px 14px;overflow-y:auto}
.rail.left{width:266px;border-right:1px solid var(--edge)}
.rail.right{width:312px;border-left:1px solid var(--edge)}
.rail-h{font-family:var(--cond);font-weight:700;font-size:14px;letter-spacing:2px;color:#eaf3ff;
  display:flex;justify-content:space-between;align-items:baseline;margin-top:4px}
.rail-h span{font-family:var(--mono);font-weight:400;font-size:10px;letter-spacing:.3px;color:var(--dim);text-transform:none}
.rail-h .limit{color:var(--accent)}
.rail-h .limit.full{color:var(--amber)}
.kit-row.fun{border-color:rgba(242,193,78,0.4)}
.kit-row.fun .kit-name{color:#f2c14e}

/* ---------- STAGE ---------- */
.stage{flex:1;display:flex;flex-direction:column;min-width:0;padding:14px 16px 12px}
.stage-head{display:flex;justify-content:space-between;align-items:center;gap:16px;font-size:12px;
  color:var(--dim);padding:0 4px 8px;white-space:nowrap}
.stage-head b{color:#eaf3ff;font-weight:600}
.stage-head .sh-right{color:var(--accent);opacity:.85}
.stage-canvas{flex:1;min-height:0;border:1px solid var(--edge);border-radius:12px;
  background:linear-gradient(180deg,rgba(10,30,60,0.55),rgba(8,22,44,0.7));overflow:hidden;position:relative}
.stage-svg{width:100%;height:100%;display:block}
.stage-foot{display:flex;gap:20px;align-items:center;padding:9px 6px 0;font-size:10.5px;color:var(--dim);flex-wrap:wrap}
.fk{display:flex;align-items:center;gap:6px}
.fk:last-child{color:var(--dim);opacity:.8;font-style:italic}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.dot.cur{background:var(--accent)}
.dot.amb{background:var(--amber)}

/* svg text */
.svg-mono{font-family:var(--mono)}
.svg-cond{font-family:var(--cond)}

/* ---------- KIT ---------- */
.kit{display:flex;flex-direction:column;gap:5px}
.kit-row{display:flex;align-items:stretch;border:1px solid var(--edge);border-radius:8px;overflow:hidden;
  background:rgba(10,30,58,0.4);transition:.15s}
.kit-row.active{border-color:var(--accent);background:rgba(28,68,112,0.55)}
.kit-main{flex:1;text-align:left;background:transparent;border:none;padding:8px 11px;cursor:pointer;color:var(--line)}
.kit-name{display:flex;align-items:center;gap:5px;font-family:var(--cond);font-weight:600;font-size:14px;letter-spacing:.6px;color:#eaf3ff}
.kit-name .rec{color:var(--amber);font-size:10px;font-style:normal}
.kit-sub{display:block;font-size:9.5px;color:var(--dim);margin-top:1px}
.kit-ctrl{display:flex;align-items:center;gap:2px;padding:0 7px;border-left:1px solid var(--edge)}
.step{width:22px;height:22px;border:1px solid var(--edge);background:rgba(8,22,44,0.6);color:var(--line);
  border-radius:5px;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}
.step:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.step:disabled{opacity:.3;cursor:default}
.cnt{width:18px;text-align:center;font-size:13px;color:#eaf3ff}
.kit-actions{display:flex;gap:8px;margin-top:2px}
.act{flex:1;font-family:var(--mono);font-size:11px;letter-spacing:.4px;padding:8px;border-radius:7px;cursor:pointer;
  border:1px solid var(--accent);background:rgba(109,179,232,0.16);color:#eaf3ff}
.act:hover{background:rgba(109,179,232,0.28)}
.act.ghost{border-color:var(--edge);background:transparent;color:var(--dim)}
.act.ghost:hover{color:var(--line);border-color:var(--dim)}

/* ---------- CURRENT ANIMATION ---------- */
@keyframes flowX{0%{opacity:0;transform:translateX(0)}12%{opacity:.9}85%{opacity:.9}100%{opacity:0;transform:translateX(var(--dx))}}
@keyframes pulseDot{0%,100%{opacity:.25}50%{opacity:.95}}
.cur{will-change:transform,opacity}
.cur-x{animation-name:flowX;animation-timing-function:linear;animation-iteration-count:infinite}
.cflow{animation:pulseDot 2.6s ease-in-out infinite}
@media (prefers-reduced-motion:reduce){.cur,.cflow{animation:none !important;opacity:.7}}

/* ---------- ORBIT / CAD ---------- */
.orbit-wrap{width:100%;height:100%;position:relative;touch-action:none}
.orbit-bar{position:absolute;top:10px;right:12px;display:flex;gap:3px;align-items:center;
  background:rgba(8,22,44,0.78);border:1px solid var(--edge);border-radius:8px;padding:4px;backdrop-filter:blur(2px)}
.ob{font-family:var(--mono);font-size:10.5px;letter-spacing:.8px;color:var(--dim);background:transparent;
  border:none;padding:5px 9px;border-radius:5px;cursor:pointer;transition:.12s}
.ob:hover{color:var(--line);background:rgba(109,179,232,0.14)}
.ob.on{background:var(--accent);color:#072039}
.ob-div{width:1px;height:16px;background:var(--edge);margin:0 3px}
.orbit-hint{position:absolute;bottom:10px;right:14px;font-size:10px;color:var(--dim);opacity:.8;letter-spacing:.3px;pointer-events:none}

/* presets */
.presets{display:flex;flex-wrap:wrap;gap:6px}
.preset{font-family:var(--mono);font-size:11px;letter-spacing:.3px;color:var(--line);
  background:rgba(10,30,58,0.5);border:1px solid var(--edge);border-radius:14px;padding:6px 12px;cursor:pointer;transition:.13s}
.preset:hover{border-color:var(--accent);background:rgba(28,68,112,0.6)}
.preset.fun{border-color:rgba(242,193,78,0.55);color:#f2c14e}
.preset.fun:hover{background:rgba(242,193,78,0.12)}

/* spec / BOM */
.selpanel{border:1px solid var(--accent);border-radius:9px;padding:10px 11px;background:rgba(28,68,112,0.4);display:flex;flex-direction:column;gap:8px;margin-bottom:2px}
.selpanel .rail-h{margin-top:0}
.selrow{display:flex;align-items:center;gap:9px}
.sl-lbl{font-size:11px;color:var(--dim);width:30px}
.sl-val{font-family:var(--cond);font-weight:700;font-size:14px;color:#eaf3ff;width:42px;text-align:right}
.size-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--edge);outline:none}
.size-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #0a1f3c}
.size-slider::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #0a1f3c}
.selact{display:flex;gap:8px}
.act.mini{padding:6px;font-size:10.5px}
.spec{display:flex;flex-direction:column;gap:9px}
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.sp{border:1px solid var(--edge);border-radius:7px;padding:8px 10px;background:rgba(10,30,58,0.4);display:flex;flex-direction:column;gap:1px}
.sp-n{font-family:var(--cond);font-weight:700;font-size:21px;color:#eaf3ff;line-height:1}
.sp-n i{font-style:normal;font-size:11px;color:var(--dim);margin-left:2px}
.sp-l{font-size:9.5px;letter-spacing:.6px;color:var(--dim);text-transform:uppercase}
.bom{display:flex;flex-direction:column;gap:2px;border:1px solid var(--edge);border-radius:7px;padding:8px 10px;background:rgba(8,22,44,0.35)}
.bom-row{display:flex;gap:9px;font-size:11px;line-height:1.7}
.bom-q{color:var(--accent);width:24px}
.bom-n{color:var(--line)}
.bom-empty{font-size:10.5px;color:var(--dim);font-style:italic}
.spec-note{font-size:9px;color:var(--dim);opacity:.7;letter-spacing:.2px}

/* ---------- SITE / CURRENT / SAVE (v3) ---------- */
.sitepanel,.currentpanel{border:1px solid var(--edge);border-radius:9px;padding:11px;background:rgba(10,30,58,0.4);display:flex;flex-direction:column;gap:9px}
.currentpanel{flex-direction:row;align-items:center;gap:12px}
.shiftrow{display:flex;align-items:center;gap:6px;margin-top:1px}
.shift-lbl{font-size:10px;color:var(--dim);margin-right:auto}
.shiftbtn{font-family:var(--mono);font-size:10.5px;color:var(--line);background:rgba(8,22,44,0.6);border:1px solid var(--edge);border-radius:6px;padding:6px 9px;cursor:pointer;transition:.13s}
.shiftbtn:hover{border-color:var(--accent);color:var(--accent)}
.dial{width:96px;height:96px;flex-shrink:0;cursor:grab;touch-action:none}
.dial:active{cursor:grabbing}
.dial-card{font-family:var(--mono);font-size:7px;fill:var(--dim);letter-spacing:.3px}
.cur-readout{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0}
.cr-line{display:flex;justify-content:space-between;align-items:baseline;font-size:10.5px;color:var(--dim)}
.cr-line b{font-family:var(--cond);font-weight:700;font-size:16px;letter-spacing:.5px;color:#eaf3ff}
.cr-line b i{font-style:normal;font-size:9px;color:var(--dim)}
.cr-hint{font-size:9.5px;line-height:1.4;color:var(--dim);opacity:.85;margin-top:2px}
.flowtog{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;letter-spacing:.8px;color:var(--dim);
  background:rgba(8,22,44,0.5);border:1px solid var(--edge);border-radius:7px;padding:7px 12px;cursor:pointer;transition:.15s}
.flowtog:hover{color:var(--line)}
.flowtog .ft-dot{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:.15s}
.flowtog.on{border-color:var(--accent);color:#eaf3ff;background:rgba(109,179,232,0.16)}
.flowtog.on .ft-dot{background:var(--accent);box-shadow:0 0 7px var(--accent)}
.savebar{display:flex;gap:7px;align-items:stretch}
.nameinput{flex:1;font-family:var(--mono);font-size:11px;color:var(--line);background:rgba(8,22,44,0.6);border:1px solid var(--edge);border-radius:7px;padding:8px 10px;outline:none;min-width:0}
.nameinput:focus{border-color:var(--accent)}
.nameinput::placeholder{color:var(--dim)}
.savebtn{flex:0 0 auto;padding:7px 14px}
.savedlist{display:flex;flex-direction:column;gap:7px}
.saved{display:flex;gap:9px;border:1px solid var(--edge);border-radius:8px;padding:7px;background:rgba(10,30,58,0.4);transition:.13s}
.saved:hover{border-color:var(--accent)}
.saved-thumb{flex:0 0 auto;width:66px;cursor:pointer;border-radius:5px;overflow:hidden}
.thumb-svg{width:66px;height:42px;display:block}
.saved-meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.saved-name{font-family:var(--cond);font-weight:600;font-size:13px;letter-spacing:.4px;color:#eaf3ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.saved-sub{font-size:9.5px;color:var(--dim)}
.saved-act{display:flex;gap:10px;margin-top:2px}
.linkbtn{font-family:var(--mono);font-size:10.5px;color:var(--accent);background:none;border:none;padding:0;cursor:pointer}
.linkbtn:hover{text-decoration:underline}
.linkbtn.del{color:var(--dim)}
.linkbtn.del:hover{color:var(--bad)}
.kit-row.organic{border-color:rgba(116,210,162,0.35)}
.kit-row.organic .org{color:var(--good);font-size:11px;font-style:normal;margin-left:2px}
.flowline{animation:flowDash linear infinite}
@keyframes flowDash{to{stroke-dashoffset:-130}}
.upwell{animation:upPulse 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes upPulse{0%,100%{opacity:.55}50%{opacity:1}}
@media (prefers-reduced-motion:reduce){.flowline,.upwell{animation:none}}

::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:var(--edge);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="reef-data.js"></script>
<script src="reef-flow.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="reef-views.jsx"></script>
<script type="text/babel" src="reef-orbit.jsx"></script>
<script type="text/babel" src="reef-app.jsx"></script>
</body>
</html>
